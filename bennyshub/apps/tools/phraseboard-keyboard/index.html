<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phraseboard Keyboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="keyboard-container">
    <div id="emoji-radial-menu" style="display:none; position:fixed; z-index:1000; left:50%; top:50%; transform:translate(-50%,-50%);">
      <div id="emoji-radial-center" style="position:relative; width:340px; height:340px;">
        <button class="emoji-radial-option" data-emoji="😀" style="position:absolute; left:50%; top:0%; transform:translate(-50%,0); font-size:2.5rem; background:none; border:none; cursor:pointer;">😀</button>
        <button class="emoji-radial-option" data-emoji="😂" style="position:absolute; left:85%; top:15%; transform:translate(-50%,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">😂</button>
        <button class="emoji-radial-option" data-emoji="😍" style="position:absolute; left:100%; top:50%; transform:translate(-100%,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">😍</button>
        <button class="emoji-radial-option" data-emoji="👍" style="position:absolute; left:85%; top:85%; transform:translate(-50%,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">👍</button>
        <button class="emoji-radial-option" data-emoji="🌸" style="position:absolute; left:50%; top:100%; transform:translate(-50%,-100%); font-size:2.5rem; background:none; border:none; cursor:pointer;">🌸</button>
        <button class="emoji-radial-option" data-emoji="❤️" style="position:absolute; left:15%; top:85%; transform:translate(-50%,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">❤️</button>
        <button class="emoji-radial-option" data-emoji="😊" style="position:absolute; left:0%; top:50%; transform:translate(0,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">😊</button>
        <button class="emoji-radial-option" data-emoji="😎" style="position:absolute; left:15%; top:15%; transform:translate(-50%,-50%); font-size:2.5rem; background:none; border:none; cursor:pointer;">😎</button>
        <button id="close-emoji-radial" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:1.5rem; background:#eee; border-radius:50%; border:none; width:48px; height:48px; cursor:pointer;">✕</button>
      </div>
    </div>
    <!-- Text Area -->
    <div class="textbar-container">
      <div id="textBar" class="textbar"></div>
    </div>
    <!-- Predictive Text Bar -->
    <div class="predict-bar" id="predictBar"></div>
    <!-- Keyboard Main Area -->
    <div class="keyboard-main">
      <div class="keyboard-row keyboard-row-actions">
        <button class="key space">SPACE</button>
        <button class="key emoji">😀</button>
        <button class="key delete" aria-label="Delete">
          <span class="visually-hidden">⌫</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="130%" viewBox="0 0 197 113" fill="none" style="display:block;">
            <path d="M57.1232 2H186.763C191.181 2 194.763 5.58172 194.763 10V103C194.763 107.418 191.181 111 186.763 111H57.1232C55.0199 111 53.0011 110.172 51.504 108.694L4.38098 62.1943C1.20643 59.0618 1.20643 53.9382 4.38098 50.8057L51.504 4.30566C53.0011 2.82836 55.0199 2 57.1232 2Z" fill="#636161" stroke="#3D362F" stroke-width="4"/>
            <g transform="translate(36,10)">
              <svg width="124" height="92" viewBox="0 0 124 92" fill="none">
                <path d="M93 34.4999L62 57.4999M62 34.4999L93 57.4999M108.5 15.3333H41.3333L5.16663 45.9999L41.3333 76.6666H108.5C111.241 76.6666 113.869 75.8588 115.807 74.4211C117.745 72.9833 118.833 71.0332 118.833 68.9999V22.9999C118.833 20.9666 117.745 19.0165 115.807 17.5788C113.869 16.141 111.241 15.3333 108.5 15.3333Z" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </g>
          </svg>
        </button>
        <button class="key clear">CLEAR</button>
        <button class="key exit">EXIT</button>
      </div>
      <div class="keyboard-row keyboard-row-1">
        <button class="key">A</button>
        <button class="key">B</button>
        <button class="key">C</button>
        <button class="key">D</button>
        <button class="key">E</button>
        <button class="key">F</button>
        <button class="key">G</button>
      </div>
      <div class="keyboard-row keyboard-row-2">
        <button class="key">H</button>
        <button class="key">I</button>
        <button class="key">J</button>
        <button class="key">K</button>
        <button class="key">L</button>
        <button class="key">M</button>
        <button class="key">N</button>
      </div>
      <div class="keyboard-row keyboard-row-3">
        <button class="key">O</button>
        <button class="key">P</button>
        <button class="key">Q</button>
        <button class="key">R</button>
        <button class="key">S</button>
        <button class="key">T</button>
        <button class="key">U</button>
      </div>
      <div class="keyboard-row keyboard-row-4">
        <button class="key">V</button>
        <button class="key">W</button>
        <button class="key">X</button>
        <button class="key">Y</button>
        <button class="key">Z</button>
        <button class="settings-emoji">⚙️</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
